<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Taskshi — Organize. Assign. Track. Achieve.</title>
<meta name="description" content="Taskshi — one team, one hierarchy, total clarity. Multi-team project and task tracking.">

<!-- Tailwind CSS (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy:   { DEFAULT: '#0F172A', 50:'#F8FAFC',100:'#F1F5F9',600:'#334155',700:'#1E293B',800:'#0F172A',900:'#0B1120' },
          brand:  { blue:'#2563EB', bluedark:'#1E3A8A', purple:'#7C3AED', teal:'#0D9488', amber:'#F59E0B', red:'#DC2626' },
        },
        fontFamily: {
          display: ['"Plus Jakarta Sans"', 'sans-serif'],
          body: ['"Inter"', 'sans-serif'],
        },
        boxShadow: {
          soft: '0 1px 2px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.08)',
          card: '0 2px 8px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04)',
          pop: '0 20px 40px -10px rgba(15,23,42,0.25)',
        }
      }
    }
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --brand-blue:#2563EB; --brand-blue-dark:#1E3A8A; --brand-purple:#7C3AED;
    --brand-teal:#0D9488; --brand-amber:#F59E0B; --brand-red:#DC2626;
    --bg:#F8FAFC; --surface:#FFFFFF; --border:#E2E8F0;
    --text-1:#0F172A; --text-2:#64748B;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  html,body{ background:var(--bg); font-family:'Inter',sans-serif; color:var(--text-1); }
  h1,h2,h3,.font-display{ font-family:'Plus Jakarta Sans',sans-serif; }
  .hidden{ display:none !important; }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#CBD5E1; border-radius:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  .brand-gradient{ background:linear-gradient(135deg, var(--brand-blue), var(--brand-purple)); }
  .brand-gradient-text{
    background:linear-gradient(135deg, var(--brand-blue), var(--brand-purple));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  a, button{ cursor:pointer; }
  button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{
    outline:2px solid var(--brand-blue); outline-offset:2px; border-radius:6px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  /* ---------- Buttons ---------- */
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.4rem; font-weight:600; font-size:.875rem;
    padding:.55rem 1rem; border-radius:.6rem; transition:all .15s ease; white-space:nowrap; border:1px solid transparent; }
  .btn-primary{ background:linear-gradient(135deg, var(--brand-blue), var(--brand-purple)); color:#fff; box-shadow:var(--tw-shadow); }
  .btn-primary:hover{ filter:brightness(1.07); transform:translateY(-1px); }
  .btn-secondary{ background:#fff; border-color:var(--border); color:var(--text-1); }
  .btn-secondary:hover{ background:#F8FAFC; border-color:#CBD5E1; }
  .btn-ghost{ background:transparent; color:var(--text-2); }
  .btn-ghost:hover{ background:#F1F5F9; color:var(--text-1); }
  .btn-danger{ background:#FEF2F2; color:#B91C1C; border-color:#FECACA; }
  .btn-danger:hover{ background:#FEE2E2; }
  .btn-sm{ padding:.35rem .65rem; font-size:.78rem; }
  .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

  input[type=text], input[type=email], input[type=password], input[type=date], textarea, select{
    width:100%; border:1px solid var(--border); border-radius:.6rem; padding:.6rem .75rem; font-size:.9rem;
    background:#fff; color:var(--text-1); transition:border-color .15s ease, box-shadow .15s ease;
  }
  input::placeholder, textarea::placeholder{ color:#94A3B8; }
  input:focus, textarea:focus, select:focus{ border-color:var(--brand-blue); box-shadow:0 0 0 3px rgba(37,99,235,.12); outline:none; }
  label.field-label{ font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:.3rem; display:block; letter-spacing:.01em; }

  /* ---------- Status badges ---------- */
  .badge{ display:inline-flex; align-items:center; gap:.3rem; font-size:.72rem; font-weight:700; padding:.2rem .55rem;
    border-radius:999px; border:1px solid transparent; letter-spacing:.01em; white-space:nowrap; }
  .badge-overdue{ background:#FEF2F2; color:#B91C1C; border-color:#FECACA; }
  .badge-duesoon{ background:#FFFBEB; color:#B45309; border-color:#FDE68A; }
  .badge-ontrack{ background:#F0FDF4; color:#15803D; border-color:#BBF7D0; }
  .badge-completed{ background:#ECFDF5; color:#047857; border-color:#A7F3D0; }
  .badge-neutral{ background:#F1F5F9; color:#475569; border-color:#E2E8F0; }
  .badge-role{ background:#EEF2FF; color:#4338CA; border-color:#E0E7FF; }
  .badge-archived{ background:#F1F5F9; color:#64748B; border-color:#E2E8F0; }

  /* ---------- Cards ---------- */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:.9rem; box-shadow:var(--tw-shadow, 0 1px 2px rgba(15,23,42,.05)); }
  .project-card{ transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
  .project-card:hover{ transform:translateY(-2px); box-shadow:0 10px 24px -8px rgba(15,23,42,.14); border-color:#CBD5E1; }

  .progress-track{ height:.4rem; background:#E2E8F0; border-radius:999px; overflow:hidden; }
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--brand-blue), var(--brand-purple)); border-radius:999px; transition:width .4s ease; }

  .avatar{ width:2rem; height:2rem; border-radius:999px; display:flex; align-items:center; justify-content:center;
    font-size:.72rem; font-weight:700; color:#fff; background:linear-gradient(135deg, var(--brand-blue), var(--brand-purple)); flex-shrink:0; }

  /* ---------- Sidebar nav ---------- */
  .nav-link{ display:flex; align-items:center; gap:.65rem; padding:.6rem .75rem; border-radius:.6rem; font-size:.88rem; font-weight:600;
    color:var(--text-2); transition:all .15s ease; }
  .nav-link:hover{ background:#F1F5F9; color:var(--text-1); }
  .nav-link.active{ background:linear-gradient(135deg, rgba(37,99,235,.1), rgba(124,58,237,.1)); color:var(--brand-blue); }
  .nav-link svg{ flex-shrink:0; }

  /* ---------- Sidebar (mobile off-canvas) ---------- */
  #sidebar{ transition:transform .25s ease; }
  @media (max-width: 1023px){
    #sidebar{ position:fixed; top:0; left:0; bottom:0; width:17rem; z-index:50; transform:translateX(-100%); }
    #sidebar.open{ transform:translateX(0); }
  }
  #sidebar-overlay{ position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:40; opacity:0; pointer-events:none; transition:opacity .25s ease; }
  #sidebar-overlay.open{ opacity:1; pointer-events:auto; }

  /* ---------- Modal ---------- */
  #modal-root:not(:empty){ position:fixed; inset:0; z-index:60; display:flex; align-items:flex-start; justify-content:center;
    padding:2.5rem 1rem; overflow-y:auto; background:rgba(15,23,42,.5); backdrop-filter:blur(2px); animation:fadeIn .15s ease; }
  .modal-panel{ background:#fff; border-radius:1rem; width:100%; max-width:34rem; box-shadow:var(--tw-shadow, 0 20px 40px -10px rgba(15,23,42,.3));
    animation:popIn .2s ease; margin:auto; }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes popIn{ from{opacity:0; transform:translateY(8px) scale(.98)} to{opacity:1; transform:translateY(0) scale(1)} }

  /* ---------- Toasts ---------- */
  #toast-container{ position:fixed; top:1rem; right:1rem; z-index:80; display:flex; flex-direction:column; gap:.5rem; max-width:22rem; }
  .toast{ background:#0F172A; color:#fff; font-size:.85rem; font-weight:500; padding:.7rem 1rem; border-radius:.6rem;
    box-shadow:0 10px 24px -6px rgba(15,23,42,.35); opacity:0; transform:translateY(-8px) translateX(0); transition:opacity .2s ease, transform .2s ease; }
  .toast-show{ opacity:1; transform:translateY(0); }
  .toast-error{ background:#B91C1C; }
  .toast-success{ background:#047857; }

  .spinner{ width:.9rem; height:.9rem; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:999px; display:inline-block; animation:spin .6s linear infinite; }
  .spinner-dark{ border-color:rgba(15,23,42,.2); border-top-color:#0F172A; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .stage-row.completed .stage-name{ text-decoration:line-through; color:#94A3B8; }
  .chip{ display:inline-flex; align-items:center; gap:.35rem; background:#F1F5F9; border:1px solid var(--border); border-radius:999px;
    padding:.25rem .5rem .25rem .65rem; font-size:.78rem; font-weight:600; color:var(--text-1); }
  .chip button{ color:#94A3B8; }
  .chip button:hover{ color:#B91C1C; }

  .tab-btn{ font-size:.82rem; font-weight:600; padding:.45rem .9rem; border-radius:.55rem; color:var(--text-2); }
  .tab-btn.active{ background:#fff; color:var(--brand-blue); box-shadow:var(--tw-shadow, 0 1px 2px rgba(15,23,42,.08)); }

  .auth-bg{
    background:
      radial-gradient(circle at 15% 20%, rgba(37,99,235,.12), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(124,58,237,.12), transparent 45%),
      var(--bg);
  }
</style>
</head>
<body class="font-body text-navy">

<div id="toast-container" aria-live="polite"></div>

<!-- ==================================================================== -->
<!-- AUTH SCREEN                                                           -->
<!-- ==================================================================== -->
<div id="auth-screen" class="auth-bg min-h-screen flex flex-col items-center justify-center px-4 py-10">
  <div class="flex items-center gap-3 mb-8">
    <img src="logo.png" alt="Taskshi Logo" class="w-11 h-11 rounded-xl object-contain" onerror="this.style.display='none'">
    <div>
      <h1 class="font-display text-2xl font-extrabold tracking-tight">Task<span class="brand-gradient-text">shi</span></h1>
      <p class="text-xs text-navy-600 -mt-0.5">One Team. One Hierarchy. Total Clarity.</p>
    </div>
  </div>

  <div class="card w-full max-w-md p-6 sm:p-8">
    <div id="auth-tabs" class="flex gap-1 bg-navy-100 p-1 rounded-lg mb-6 text-center"></div>
    <div id="auth-panels"></div>
  </div>

  <p class="text-xs text-navy-600 mt-8 text-center max-w-sm">
    Access is invite-only. The very first person ever to open Taskshi becomes its
    <strong>Creator</strong>. Everyone else is invited by email — use <strong>Accept Invite</strong> to activate.
  </p>
</div>

<!-- ==================================================================== -->
<!-- APP SHELL                                                             -->
<!-- ==================================================================== -->
<div id="app-shell" class="hidden min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-navy-100">
    <div class="h-16 px-3 sm:px-5 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2 min-w-0">
        <button id="hamburger-btn" class="lg:hidden btn btn-ghost btn-sm !p-2" aria-label="Toggle menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <img src="logo.png" alt="Taskshi Logo" class="w-8 h-8 rounded-lg object-contain flex-shrink-0" onerror="this.style.display='none'">
        <span class="font-display font-extrabold text-lg tracking-tight hidden sm:inline">Task<span class="brand-gradient-text">shi</span></span>
      </div>

      <div id="company-switcher-wrap" class="hidden md:block flex-1 max-w-xs"></div>

      <div class="flex items-center gap-2 sm:gap-3">
        <div id="user-menu"></div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 min-h-0">
    <div id="sidebar-overlay"></div>
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white border-r border-navy-100 flex-shrink-0 flex flex-col p-3 lg:p-4 gap-1 overflow-y-auto">
      <nav id="sidebar-nav" class="flex flex-col gap-1"></nav>
      <div id="sidebar-teams-block" class="mt-5"></div>
      <div class="mt-auto pt-4 hidden lg:block">
        <div class="rounded-xl bg-navy-100 p-3 text-xs text-navy-600 leading-relaxed">
          <strong class="text-navy-800 block mb-1">Taskshi</strong>
          Organize. Assign. Track. Achieve.
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main id="main-content" class="flex-1 min-w-0 p-4 sm:p-6 lg:p-8"></main>
  </div>

  <footer class="border-t border-navy-100 py-4 text-center">
    <p class="text-xs text-navy-600">Developed by <span class="font-semibold text-navy-800">Reconense</span></p>
  </footer>
</div>

<!-- Modal root: populated dynamically -->
<div id="modal-root"></div>

<script type="module" src="app.js"></script>
<script>
  // If app.js fails to load or errors out at the top level (blocked import, wrong
  // path, opened via file:// instead of a server, etc.), the auth screen would
  // otherwise stay silently blank. This gives an actual on-page diagnostic instead.
  setTimeout(function () {
    if (window.__taskshiBooted) return;
    var panels = document.getElementById("auth-panels");
    if (!panels || panels.innerHTML.trim()) return; // already rendered something
    panels.innerHTML =
      '<div style="font-size:13px;line-height:1.5;color:#B91C1C;background:#FEF2F2;' +
      'border:1px solid #FECACA;border-radius:10px;padding:14px;">' +
      '<strong>Taskshi didn\'t load.</strong> Open your browser\'s DevTools console ' +
      '(F12 → Console) and reload — the exact error will be there. Common causes:' +
      '<ul style="margin:8px 0 0 18px;padding:0;">' +
      '<li>Opened as a <code>file://</code> URL instead of through a local server ' +
      '(run <code>npx serve .</code> or <code>python3 -m http.server</code> in this folder).</li>' +
      '<li><code>app.js</code> isn\'t sitting next to <code>index.html</code>.</li>' +
      '<li>A network/ad-blocker is blocking Firebase\'s gstatic.com scripts.</li>' +
      "</ul></div>";
  }, 3500);
</script>
</body>
</html>
